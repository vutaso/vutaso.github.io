name = "testchatai-deepseek-proxy"
main = "src/index.js"
compatibility_date = "2024-06-01"

# CORS: comma-separated origins allowed to call this worker.
[vars]
ALLOWED_ORIGINS = "https://vutaso.com,https://www.vutaso.com,https://vutaso.github.io,http://localhost:5500,http://127.0.0.1:5500,http://localhost:8080,http://127.0.0.1:8080,http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://127.0.0.1:3000"

[[kv_namespaces]]
binding = "SHARES"
id = "860ddb0c8d604689b8b51e02d95baa5c"
preview_id = "1559e030d6cc40e28cdb48049388e398"

# Set secret before deploy (do NOT commit the key):
#   cd TestChatAI/worker
#   npx wrangler secret put DEEPSEEK_API_KEY
#
# Deploy:
#   npx wrangler deploy
#
# Then set in js/config.js:
#   DEEPSEEK_PROXY_ENDPOINT = workers.dev URL (root path)
#   NVIDIA_PROXY_ENDPOINT   = same URL + '/nvidia'
#   SHARE_ENDPOINT          = same URL + '/share'
