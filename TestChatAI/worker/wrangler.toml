name = "testchatai-deepseek-proxy"
main = "src/index.js"
compatibility_date = "2024-06-01"

# CORS: comma-separated origins allowed to call this worker.
[vars]
ALLOWED_ORIGINS = "https://vutaso.com,https://www.vutaso.com,https://vutaso.github.io,http://localhost:5500,http://127.0.0.1:5500"

# Set secret before deploy (do NOT commit the key):
#   cd TestChatAI/worker
#   npx wrangler secret put DEEPSEEK_API_KEY
#
# Deploy:
#   npx wrangler deploy
#
# Then set DEEPSEEK_PROXY_ENDPOINT in js/config.js to the workers.dev URL shown after deploy.
